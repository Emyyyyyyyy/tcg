<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Cartes</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <h2>Générateur de cartes</h2>
    
    <button id="charger">Charger un JSON</button>
    <button id="telecharger">Télécharger la carte</button>
    
    <input type="file" id="jsonFile" accept=".json" style="display:none;">

    <div id="carte-render" class="carte-cadre">
        <div id="contenu-carte"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
